<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/templates/css/style.css">
    <title>Login</title>
</head>
<body>
    <header class="header-container">
        <h1 class="main-title">
            <span class="title"><a href="/templates/index.html">CatFish Store</a></span>
        </h1>
        
        <nav class="nav-bar">
            <ul>
                <li><a href="/templates/index.html">home</a></li>
                <li><a href="">about</a></li>
                <li><a href="">contact-us</a></li>
                <li><a href="login.html">login</a></li>
            </ul>
        </nav>
    </header>

    <main class="login-container">
        <div class="login-form">
            <h2>Register Your Account</h2>
            <form action="#" method="POST">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="text" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label for="createpassword">Password</label>
                    <input type="createpassword" id="createpassword" name="createpassword" placeholder="Create your password" required>
                </div>
                <div class="input-group">
                    <label for="confirmpassword">Confirm</label>
                    <input type="confirmpassword" id="confirmpassword" name="confirmpassword" placeholder="Confirm your password" required>
                </div>
                <div class="button-group">
                    <button type="submit">Register</button>
                </div>
                <div class="login-link">
                    <p>Have an account? <a href="home.html">Login</a></p>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer-container">
        <span class="author"><a href="https://github.com/EduardoStockler02">By Eduardo Stockler</a></span>
    </footer>
</body>
</html>
